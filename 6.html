<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receipt</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      }
      .card {
        position: relative;
        width: 100%;
        max-width: 390px;
        aspect-ratio: 390 / 844;
        background: url("6.jpg") no-repeat center;
        background-size: 100% 100%;
      }
      .value {
        position: absolute;
        right: 5%;
        color: #090909d6;
        font-weight: 520;
        font-size: 3.8vw;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }

      .v1 {
        top: 32.5%;
      }
      .v2 {
        top: 37.5%;
      }
      .v3 {
        top: 42.3%;
      }
      .v4 {
        top: 47%;
      }
      .v5 {
        top: 52%;
      }
      .v6 {
        top: 56.8%;
      }
      .v7 {
        top: 61.5%;
      }
      .v8 {
        top: 66.3%;
      }
      .v9 {
        top: 71%;
      }
      .v10 {
        top: 75.8%;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="value v1" id="receipt">1-798958880</div>
      <div class="value v2">28.02.2026 18:04</div>
      <div class="value v3" id="amount">7,50 AZN</div>
      <div class="value v4">0,00 AZN</div>
      <div class="value v5" id="total-amount">7,50 AZN</div>
      <div class="value v6">****7604</div>
      <div class="value v7">****9604</div>
      <div class="value v8">*****</div>
      <div class="value v9">Uğurlu</div>
      <div class="value v10">Köçürmə</div>
    </div>

    <script>
      // localStorage-dan məlumatlar
      const amount = localStorage.getItem("amount") || "0.00";
      const card = localStorage.getItem("card") || "0000";
      const time = localStorage.getItem("time") || "";

      // Məbləğ
      document.getElementById("amount").innerText = amount + " AZN";

      // Ümumi məbləğ
      const totalEl = document.getElementById("total-amount");
      if (totalEl) totalEl.innerText = amount + " AZN";

      // Kart (yalnız aşağı dəyişir)
      document.querySelector(".v7").innerText = "****" + card;

      // Vaxt
      document.querySelector(".v2").innerText = time;

      // 🔥 Random qəbz nömrəsi
      const randomNumber = Math.floor(100000000 + Math.random() * 900000000);
      document.getElementById("receipt").innerText = "1-" + randomNumber;
    </script>
  </body>
</html>
