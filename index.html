<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />

    <!-- FULLSCREEN META -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />

    <title>Bank App</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: manipulation;
        font-family: sans-serif;
      }

      .screen {
        width: 100vw;
        height: 100vh;
        position: relative;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .click-area {
        position: absolute;
        cursor: pointer;
      }

      .btn-transfer {
        top: 36%;
        left: 5%;
        width: 25%;
        height: 10%;
      }

      .btn-payment {
        top: 36%;
        left: 37%;
        width: 25%;
        height: 10%;
      }

      .btn-history {
        top: 36%;
        right: 5%;
        width: 25%;
        height: 10%;
      }

      .card-area {
        top: 50%;
        left: 3%;
        width: 94%;
        height: 12%;
      }

      .click-area:active {
        background: rgba(255, 255, 255, 0.08);
      }

      /* ✅ BALANS ÜÇÜN (yalnız əlavə olundu) */
      #balance {
        position: absolute;
        top: 53.5%;
        left: 24.5%;
        color: rgb(35, 34, 34);
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="screen">
      <img src="bank.png" alt="Bank App" />

      <!-- ✅ BALANS -->
      <div id="balance">2 800 ₼</div>

      <div
        class="click-area btn-transfer"
        onclick="goPage('2.html')"
        aria-label="Transfer"
      ></div>
      <div
        class="click-area btn-payment"
        onclick="goPage('payment.html')"
        aria-label="Payment"
      ></div>
      <div
        class="click-area btn-history"
        onclick="goPage('history.html')"
        aria-label="History"
      ></div>
      <div
        class="click-area card-area"
        onclick="goPage('2.html')"
        aria-label="Card"
      ></div>
    </div>

    <script>
      function goPage(page) {
        window.location.href = page;
      }

      // swipe disable (app kimi hiss)
      document.addEventListener(
        "touchmove",
        function (e) {
          e.preventDefault();
        },
        { passive: false },
      );

      // iOS / Android “Add to Home Screen” prompt
      let deferredPrompt;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      // Qismən fullscreen (browser-də)
      window.addEventListener("load", () => {
        setTimeout(() => {
          window.scrollTo(0, 1);
        }, 100);
      });

      /* ✅ BALANS SİSTEMİ (yalnız əlavə olundu) */
      let balance = localStorage.getItem("balance")
        ? parseFloat(localStorage.getItem("balance"))
        : 2800;

      function updateBalance() {
        document.getElementById("balance").innerText = balance + " ₼";
        localStorage.setItem("balance", balance);
      }

      updateBalance();
    </script>
  </body>
</html>
